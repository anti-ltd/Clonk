name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs of the same branch on a new push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    # Package.swift targets macOS 26 (Tahoe). Use `macos-latest` so this picks
    # up the Tahoe runner image once GitHub publishes it; until then, runs may
    # fail at `swift build` with an SDK-too-old error — that's expected.
    runs-on: macos-latest

    steps:
      - name: Checkout Clonk
        uses: actions/checkout@v4
        with:
          path: clonk

      # Clonk depends on iUX-MacOS via a local path (../iUX-MacOS). Clone it
      # as a sibling so Package.swift resolves cleanly.
      - name: Checkout iUX-MacOS
        uses: actions/checkout@v4
        with:
          repository: anti-ltd/iUX-MacOS
          path: iUX-MacOS

      - name: Show toolchain
        run: |
          swift --version
          sw_vers

      - name: Build (release)
        working-directory: clonk
        run: swift build -c release

      - name: Test
        working-directory: clonk
        run: swift test
